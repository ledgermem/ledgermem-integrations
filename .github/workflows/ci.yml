name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ts-ai-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ts/ai-sdk/package-lock.json
      - working-directory: ts/ai-sdk
        run: |
          npm install
          npx tsc --noEmit

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - python/langchain-ledgermem
          - python/llama-index-vector-stores-ledgermem
          - python/ledgermem-autogen
          - python/ledgermem-crewai
          - python/ledgermem-pydantic-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - working-directory: ${{ matrix.package }}
        run: pip install -e .
